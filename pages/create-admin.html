<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Admin Account - SuperX Mart</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/auth.css">
</head>
<body class="auth-page">
    <div class="auth-bg-shapes">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
    </div>
    
    <div class="auth-container" style="margin: auto;">
        <div class="auth-card">
            <div class="auth-header">
                <h1 style="color: var(--primary-color);">Setup Admin Account</h1>
                <p>Use this tool to create an official Admin account for SuperX Mart.</p>
            </div>

            <form class="auth-form" id="admin-signup-form">
                <div class="input-group">
                    <label for="admin-name">Admin Name</label>
                    <input type="text" id="admin-name" placeholder="SuperX Admin" required>
                </div>

                <div class="input-group">
                    <label for="admin-email">Admin Email</label>
                    <input type="email" id="admin-email" placeholder="admin@superxmart.com" required>
                </div>

                <div class="input-group">
                    <label for="admin-password">Secure Password</label>
                    <input type="password" id="admin-password" placeholder="Create a strong password" required minlength="6">
                </div>

                <button type="submit" class="btn btn-primary" style="background: linear-gradient(to right, #ef4444, #f97316); border: none;">Create Admin User</button>
            </form>

            <div class="auth-links" style="margin-top: 20px;">
                <p><a href="login.html">Return to Login</a></p>
            </div>
        </div>
    </div>

    <!-- We must import Firebase directly here instead of using auth.js to avoid the AuthGuard intercepting and redirecting us -->
    <script type="module">
        import { initTheme, showToast } from '../js/ui.js';
        import { auth, db } from '../firebaseConfig.js';
        import { createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
        import { doc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

        document.addEventListener('DOMContentLoaded', () => {
            initTheme();
            
            const form = document.getElementById('admin-signup-form');
            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                
                const name = document.getElementById('admin-name').value;
                const email = document.getElementById('admin-email').value;
                const password = document.getElementById('admin-password').value;

                try {
                    // Create user in Firebase Auth
                    const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                    const uid = userCredential.user.uid;

                    // Immediately save to Firestore with role = admin
                    await setDoc(doc(db, "users", uid), {
                        name: name,
                        email: email,
                        phone: "N/A",
                        role: "admin",
                        createdAt: serverTimestamp()
                    });

                    showToast('Admin Account Created Successfully! Redirecting to login...', 'success');
                    
                    setTimeout(() => {
                        window.location.replace('login.html');
                    }, 2000);
                } catch (error) {
                    showToast(error.message, 'error');
                }
            });
        });
    </script>
</body>
</html>
