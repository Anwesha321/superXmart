<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password | Superxmart</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/landing.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body class="landing-page bg-[#0a0a0a] text-gray-100">
    <!-- Ambient Glow blobs -->
    <div class="glow-blob glow-blob-1"></div>
    <div class="glow-blob glow-blob-2"></div>

    <!-- Navigation Header -->
    <nav class="navbar">
        <a href="../index.html" class="nav-logo-link" style="font-size: 1.25rem; font-weight: 700; color: var(--primary-color); text-decoration: none;">
            <i class="fa-solid fa-bolt-lightning"></i> SuperX Mart
        </a>
    </nav>

    <!-- Auth Guard -->
    <script type="module" src="../js/authGuard.js"></script>

    <div class="auth-container">
        <div class="glass-card">
            <div class="auth-header">
                <h1>Reset password</h1>
                <p>Enter your email and we'll send you a link to reset your password.</p>
            </div>

            <form id="forgotPasswordForm">
                <div class="input-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" required placeholder="Enter your email">
                </div>

                <button type="submit" class="btn btn-primary" id="resetBtn">
                    <span class="spinner"></span>
                    <span class="btn-text">Send Reset Link</span>
                </button>
            </form>

            <p class="text-center mt-4 text-sm text-secondary">
                <a href="login.html" class="link"><i class="fa-solid fa-arrow-left"></i> Back to log in</a>
            </p>
        </div>
    </div>

    <script type="module" src="../js/theme.js"></script>
    <script type="module" src="../js/auth.js"></script>
</body>
</html>
