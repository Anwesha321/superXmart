<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buyer Sign Up | Superxmart</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/landing.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body class="landing-page bg-[#0a0a0a] text-gray-100">
    <!-- Ambient Glow blobs -->
    <div class="glow-blob glow-blob-1"></div>
    <div class="glow-blob glow-blob-2"></div>

    <!-- Navigation Header -->
    <nav class="navbar">
        <a href="../index.html" class="nav-logo-link" style="font-size: 1.25rem; font-weight: 700; color: var(--primary-color); text-decoration: none;">
            <i class="fa-solid fa-bolt-lightning"></i> SuperX Mart
        </a>
    </nav>

    <!-- Auth Guard -->
    <script type="module" src="../js/authGuard.js"></script>

    <div class="auth-container" style="padding: 2rem 1rem;">
        <div class="glass-card" style="max-width: 500px;">
            <div class="auth-header">
                <h1>Buyer Registration</h1>
                <p>Create your buyer account</p>
            </div>

            <form id="signupBuyerForm">
                <div class="input-group">
                    <label for="buyerName">Full Name</label>
                    <input type="text" id="buyerName" required placeholder="Enter your full name">
                </div>

                <div class="input-group">
                    <label for="buyerEmail">Email</label>
                    <input type="email" id="buyerEmail" required placeholder="Enter your email">
                </div>

                <div class="input-group">
                    <label for="buyerPhone">Phone Number</label>
                    <input type="tel" id="buyerPhone" required placeholder="Enter your phone number">
                </div>

                <div class="input-group">
                    <label for="buyerPassword">Password</label>
                    <input type="password" id="buyerPassword" required placeholder="Create a password (min 6 chars)">
                    <button type="button" class="toggle-password" data-target="buyerPassword">
                        <i class="fa-regular fa-eye"></i>
                    </button>
                </div>

                <div class="input-group">
                    <label for="buyerConfirmPassword">Confirm Password</label>
                    <input type="password" id="buyerConfirmPassword" required placeholder="Confirm your password">
                    <button type="button" class="toggle-password" data-target="buyerConfirmPassword" style="top: 2.3rem;">
                        <i class="fa-regular fa-eye"></i>
                    </button>
                </div>

                <button type="submit" class="btn btn-primary" id="signupBuyerBtn">
                    <span class="spinner"></span>
                    <span class="btn-text">Sign Up as Buyer</span>
                </button>
            </form>

            <p class="text-center mt-4 text-sm text-secondary">
                Already have an account? <a href="login.html" class="link">Log in</a>
            </p>
            <p class="text-center mt-4 text-sm text-secondary">
                <a href="signup.html" class="link"><i class="fa-solid fa-arrow-left"></i> Back to roles</a>
            </p>
        </div>
    </div>

    <script type="module" src="../js/theme.js"></script>
    <script type="module" src="../js/auth.js"></script>
</body>
</html>
