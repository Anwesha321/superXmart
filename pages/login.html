<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Superxmart</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/landing.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body class="landing-page bg-[#0a0a0a] text-gray-100">
    <!-- Ambient Glow blobs -->
    <div class="glow-blob glow-blob-1"></div>
    <div class="glow-blob glow-blob-2"></div>

    <!-- Navigation Header -->
    <nav class="navbar">
        <a href="../index.html" class="nav-logo-link" style="font-size: 1.25rem; font-weight: 700; color: var(--primary-color); text-decoration: none;">
            <i class="fa-solid fa-bolt-lightning"></i> SuperX Mart
        </a>
    </nav>
    
    <!-- Auth Guard -->
    <script type="module" src="../js/authGuard.js"></script>

    <div class="auth-container">
        <div class="glass-card">
            <div class="auth-header">
                <h1>Welcome back</h1>
                <p>Enter your details to access your account</p>
            </div>

            <div id="unverifiedAlert" style="display: none; background: rgba(239, 68, 68, 0.1); border: 1px solid var(--danger); padding: 1rem; border-radius: 0.5rem; margin-bottom: 1.5rem; text-align: center;">
                <p class="text-sm" style="color: var(--danger); margin-bottom: 0.5rem;">Please verify your email.</p>
                <button type="button" id="resendVerificationBtn" class="link text-sm" style="background:none; border:none; padding:0; cursor:pointer;">Resend verification email</button>
            </div>

            <form id="loginForm">
                <div class="input-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" required placeholder="Enter your email">
                </div>

                <div class="input-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" required placeholder="Enter your password">
                    <button type="button" class="toggle-password" data-target="password">
                        <i class="fa-regular fa-eye"></i>
                    </button>
                </div>

                <div class="flex-between mb-4">
                    <label class="checkbox-group">
                        <input type="checkbox" id="rememberMe">
                        <span>Remember me</span>
                    </label>
                    <a href="forgot-password.html" class="link text-sm">Forgot password?</a>
                </div>

                <button type="submit" class="btn btn-primary" id="loginBtn">
                    <span class="spinner"></span>
                    <span class="btn-text">Sign In</span>
                </button>
            </form>

            <div class="divider">or continue with</div>

            <button type="button" class="btn btn-google" id="googleLoginBtn">
                <img src="https://www.svgrepo.com/show/475656/google-color.svg" alt="Google">
                <span>Google</span>
            </button>

            <p class="text-center mt-4 text-sm text-secondary">
                Don't have an account? <a href="signup.html" class="link">Sign up</a>
            </p>
        </div>
    </div>

    <script type="module" src="../js/theme.js"></script>
    <script type="module" src="../js/auth.js"></script>
</body>
</html>
